# SonarQube scanner config — the ANALYZE-AND-UPLOAD step.
#
# The Code Review agent only READS results (via integrations/sonarqube.py -> /api/issues/search).
# Something must analyze the generated code and push it to the server first; that is the scanner,
# configured here. Run it AFTER code generation and BEFORE the review reads issues.
#
# projectKey MUST match SONARQUBE_PROJECT_KEY in .env so the agent queries the same component.
sonar.projectKey=sdlc-implementation
sonar.projectName=SDLC Implementation Service

# Analyze the generated code. Point this at the workspace the Code Generator writes to
# (config: WORKSPACE_DIR, default app/workspace). Narrow to a specific run dir if you prefer.
sonar.sources=app/workspace

# Keep noise out of the report.
sonar.exclusions=**/.venv/**,**/node_modules/**,**/__pycache__/**,**/*.min.js

# Encoding of the source files.
sonar.sourceEncoding=UTF-8

# sonar.host.url and sonar.token are passed at invocation (see below) rather than committed here,
# so no secret lives in the repo. Example run, from services/implementation/ with the server up:
#
#   docker run --rm --network host \
#     -e SONAR_HOST_URL="http://localhost:9000" \
#     -e SONAR_TOKEN="<your-token>" \
#     -v "$PWD:/usr/src" \
#     sonarsource/sonar-scanner-cli
#
# Then the Code Review agent (SONARQUBE_ENABLED=true) reads the issues for this projectKey.
