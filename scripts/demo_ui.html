<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Code Generator Agent — Demo</title>
<style>
  :root {
    --bg: #f4f5f7; --panel: #ffffff; --ink: #1f2430; --muted: #6b7280;
    --line: #e5e7eb; --accent: #4f46e5; --accent-ink: #fff;
    --agent: #eef2ff; --user: #4f46e5; --ok: #16a34a; --warn: #d97706; --bad: #dc2626;
    --chip: #f1f5f9; --code-bg: #0f172a; --code-ink: #e2e8f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1017; --panel: #151a23; --ink: #e6e9ef; --muted: #94a3b8;
      --line: #262d3a; --agent: #1b2233; --chip: #1e2634; --code-bg: #0b0e14;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 12px 18px;
           display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0 12px 0 0; font-weight: 650; }
  header .grow { flex: 1; }
  select, input, button, textarea { font: inherit; color: var(--ink); }
  select, input[type=text] { background: var(--bg); border: 1px solid var(--line);
           border-radius: 8px; padding: 7px 10px; }
  button { background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px;
           padding: 8px 14px; cursor: pointer; font-weight: 600; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  main { flex: 1; overflow-y: auto; padding: 22px; }
  .wrap { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble { max-width: 82%; padding: 12px 14px; border-radius: 14px; background: var(--agent);
            border: 1px solid var(--line); }
  .row.user .bubble { background: var(--user); color: #fff; border-color: transparent; }
  .bubble .who { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .row.user .who { color: #dfe3ff; }
  .item-title { font-weight: 650; }
  .meta { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .row.user .meta { color: #e6e9ff; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .chip { background: var(--chip); border: 1px solid var(--line); border-radius: 999px;
          padding: 4px 10px; font-size: 12.5px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
          cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px;
           border-radius: 999px; margin-left: 6px; }
  .badge.ok { background: rgba(22,163,74,.15); color: var(--ok); }
  .badge.bad { background: rgba(220,38,38,.15); color: var(--bad); }
  .review { background: var(--panel); border: 1px solid var(--accent); border-radius: 14px; padding: 16px; }
  .review h3 { margin: 0 0 6px; font-size: 15px; }
  .review .actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .review textarea { width: 100%; min-height: 62px; margin-top: 10px; border: 1px solid var(--line);
                     border-radius: 8px; padding: 8px 10px; background: var(--bg); resize: vertical; }
  .status { text-align: center; color: var(--muted); font-size: 13px; }
  .done { color: var(--ok); font-weight: 650; }
  /* file viewer slide-over */
  #viewer { position: fixed; top: 0; right: 0; height: 100vh; width: min(560px, 92vw);
            background: var(--panel); border-left: 1px solid var(--line); transform: translateX(100%);
            transition: transform .18s ease; display: flex; flex-direction: column; z-index: 20;
            box-shadow: -8px 0 30px rgba(0,0,0,.15); }
  #viewer.open { transform: translateX(0); }
  #viewer .vhead { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex;
                   gap: 10px; align-items: center; }
  #viewer .vhead .path { font-family: ui-monospace, monospace; font-size: 13px; flex: 1;
                         word-break: break-all; }
  #viewer .vclose { background: transparent; color: var(--muted); border: 0; font-size: 20px; padding: 0 6px; }
  #viewer pre { margin: 0; flex: 1; overflow: auto; padding: 16px; background: var(--code-bg);
                color: var(--code-ink); font: 13px/1.55 ui-monospace, monospace; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--muted);
             border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite;
             vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>🤖 Code Generator Agent</h1>
  <label>Design package
    <select id="pack"></select>
  </label>
  <label>Project id
    <input id="pid" type="text" value="demo" size="10" />
  </label>
  <button id="start">Start run ▶</button>
  <span class="grow"></span>
  <span id="hint" style="color:var(--muted);font-size:13px">…</span>
</header>

<main>
  <div class="wrap" id="chat"></div>
</main>

<div id="viewer">
  <div class="vhead">
    <span class="path" id="vpath"></span>
    <button class="vclose" onclick="closeViewer()">✕</button>
  </div>
  <pre id="vbody"></pre>
</div>

<script>
const chat = document.getElementById('chat');
let currentRun = null;

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error((await res.text()) || res.statusText);
  return res.headers.get('content-type')?.includes('json') ? res.json() : res.text();
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function scroll() { document.querySelector('main').scrollTop = 1e9; }

function bubble(side, whoLabel) {
  const row = el('div', 'row ' + side);
  const b = el('div', 'bubble');
  b.appendChild(el('div', 'who', whoLabel));
  row.appendChild(b);
  chat.appendChild(row);
  scroll();
  return b;
}

function agentSays(html) { const b = bubble('agent', 'Agent'); b.appendChild(el('div', '', html)); scroll(); return b; }
function userSays(html)  { const b = bubble('user', 'You');   b.appendChild(el('div', '', html)); scroll(); return b; }

function fileChips(files) {
  const wrap = el('div', 'chips');
  files.forEach(f => {
    const c = el('div', 'chip', f.split('/').slice(1).join('/') || f);
    c.title = f;
    c.onclick = () => openFile(f);
    wrap.appendChild(c);
  });
  return wrap;
}

function renderEvent(ev) {
  if (ev.kind === 'scaffold') {
    const b = bubble('agent', 'Agent');
    b.appendChild(el('div', '', '🧱 <b>Scaffolded boilerplate</b> — ' + ev.files.length + ' files rendered from templates (no LLM).'));
    b.appendChild(fileChips(ev.files));
  } else if (ev.kind === 'item') {
    const b = bubble('agent', 'Agent');
    const badge = ev.failed ? '<span class="badge bad">failed</span>' : '<span class="badge ok">' + ev.files.length + ' files</span>';
    b.appendChild(el('div', 'item-title', '🧩 ' + ev.id + badge));
    if (ev.plan) b.appendChild(el('div', 'meta', '📋 ' + ev.plan));
    if (ev.files.length) b.appendChild(fileChips(ev.files));
  }
}

function renderSnapshot(snap, opts = {}) {
  currentRun = snap.run_id;
  if (!opts.skipEvents) (snap.events || []).forEach(renderEvent);

  if (snap.status === 'pending_review') {
    const items = (snap.events || []).filter(e => e.kind === 'item').map(e => e.id);
    reviewCard(snap, items);
  } else if (snap.status === 'completed') {
    let msg = '🎉 <span class="done">Committed.</span> All ' + snap.item_count +
      ' work items approved — one run-level commit written. <b>' + snap.file_count + '</b> files total.';
    if (snap.out_dir) msg += '<div class="meta">On disk (real git repo): <code>' + snap.out_dir +
      '</code> — run <code>git log</code> there to see the commit.</div>';
    agentSays(msg);
  } else if (snap.status === 'needs_human_review') {
    agentSays('⚠️ Escalated for human review (a work item hit the repair cap).');
  }
}

function reviewCard(snap, items) {
  const b = bubble('agent', 'Agent');
  b.appendChild(el('div', '', '✅ <b>All ' + snap.item_count + ' work items generated & gate-passed</b> (' +
    snap.file_count + ' files). Nothing is committed yet — your call:'));
  const card = el('div', 'review');
  card.innerHTML =
    '<h3>Batch review</h3>' +
    '<div class="meta">Approve to write the single run-level commit, or reject a work item to send it back through the repair path with your feedback.</div>' +
    '<div class="actions">' +
      '<button id="approve">✔ Approve &amp; commit</button>' +
      '<select id="rejItem">' + items.map(i => '<option>' + i + '</option>').join('') + '</select>' +
      '<button class="ghost" id="reject">↩ Reject &amp; rework</button>' +
    '</div>' +
    '<textarea id="rejNote" placeholder="Feedback for the rejected item (e.g. \'add input validation on email\')"></textarea>';
  b.appendChild(card);
  scroll();

  card.querySelector('#approve').onclick = () => sendReview({ approved: true });
  card.querySelector('#reject').onclick = () => {
    const id = card.querySelector('#rejItem').value;
    const note = card.querySelector('#rejNote').value.trim() || 'please revise this work item';
    card.querySelectorAll('button').forEach(x => x.disabled = true);
    sendReview({ approved: false, rejections: { [id]: note } });
  };
}

async function sendReview(decision) {
  if (decision.approved) userSays('✔ <b>Approve &amp; commit</b>');
  else {
    const [id, note] = Object.entries(decision.rejections)[0];
    userSays('↩ <b>Reject</b> <code>' + id + '</code> — ' + note);
  }
  const thinking = agentSays('<span class="spinner"></span>working…');
  try {
    const snap = await api('/api/review', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ run_id: currentRun, ...decision }),
    });
    thinking.closest('.row').remove();
    if (snap.reworked && Object.keys(snap.reworked).length) {
      for (const [id, files] of Object.entries(snap.reworked)) {
        const b = bubble('agent', 'Agent');
        b.appendChild(el('div', '', '🔧 <b>Reworked</b> <code>' + id + '</code> via the repair path — re-gated and back for review.'));
        if (files.length) b.appendChild(fileChips(files));
      }
      renderSnapshot(snap, { skipEvents: true });
    } else {
      renderSnapshot(snap, { skipEvents: true });
    }
  } catch (e) {
    thinking.closest('.row').remove();
    agentSays('❌ ' + e.message);
  }
}

async function openFile(path) {
  document.getElementById('vpath').textContent = path;
  document.getElementById('vbody').textContent = 'loading…';
  document.getElementById('viewer').classList.add('open');
  try {
    document.getElementById('vbody').textContent =
      await api('/api/file?run_id=' + encodeURIComponent(currentRun) + '&path=' + encodeURIComponent(path));
  } catch (e) {
    document.getElementById('vbody').textContent = e.message;
  }
}
function closeViewer() { document.getElementById('viewer').classList.remove('open'); }

document.getElementById('start').onclick = async () => {
  const pack = document.getElementById('pack').value;
  const pid = document.getElementById('pid').value.trim() || 'demo';
  if (!pack) return;
  chat.innerHTML = '';
  userSays('▶ Start run on <b>' + pack + '</b>');
  const thinking = agentSays('<span class="spinner"></span>building plan &amp; generating…');
  document.getElementById('start').disabled = true;
  try {
    const snap = await api('/api/run', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pack, project_id: pid }),
    });
    thinking.closest('.row').remove();
    agentSays('🚀 Decomposed the design package into <b>' + snap.item_count +
      '</b> work items. Generating each now…');
    renderSnapshot(snap);
  } catch (e) {
    thinking.closest('.row').remove();
    agentSays('❌ ' + e.message);
  } finally {
    document.getElementById('start').disabled = false;
  }
};

(async function init() {
  let mode = 'dry-run', outDir = '';
  try {
    const m = await api('/api/mode'); mode = m.mode; outDir = m.out_dir;
  } catch (e) { /* default */ }
  const hint = document.getElementById('hint');
  if (mode === 'real') hint.innerHTML = '🟢 REAL · Claude · commits to disk';
  else hint.innerHTML = '⚪ dry-run · in-memory · stub code';

  try {
    const { packs } = await api('/api/packs');
    const sel = document.getElementById('pack');
    packs.forEach(p => sel.appendChild(el('option', '', p)));
    if (!packs.length) sel.appendChild(el('option', '', '(no packs found in fixtures/)'));
  } catch (e) { /* leave empty */ }

  const intro = mode === 'real'
    ? "Hi! <b>REAL mode.</b> Pick a design package and hit <b>Start run</b> — I'll call Claude to " +
      "generate real code, write it to disk, check every required file is present, then pause for " +
      "your review. On approval I make a real local git commit" + (outDir ? " under <code>" + outDir + "</code>" : "") + "."
    : "Hi! <b>Dry-run.</b> Pick a design package and hit <b>Start run</b>. I'll scaffold boilerplate, " +
      "plan &amp; generate (stub) code per work item, then pause for review before committing. " +
      "Start with <code>--real</code> for actual Claude output + a real commit.";
  agentSays(intro);
})();
</script>
</body>
</html>
