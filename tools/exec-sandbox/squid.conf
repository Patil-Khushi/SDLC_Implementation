# exec-sandbox egress allowlist: PyPI + npm registries ONLY.
#
# exec-sandbox has no route to the internet of its own (it sits on the `sandbox-internal` network,
# which docker-compose.yml marks `internal: true`) — every outbound request from the sandbox goes
# through this proxy (HTTP_PROXY/HTTPS_PROXY point here), which is the only container on both
# `sandbox-internal` and `sandbox-egress` (the network with a real route out). Anything not on the
# allowlist below is refused, including github.com — this sandbox is deliberately NOT able to push
# to git remotes; publish/push is a host-side concern (scripts/local_executor.py).

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Allowlist rationale — the two registries the compile/build/test checks actually reach, and
# their file-download hosts (metadata and package tarballs are served from different domains):
#   .pypi.org          — PyPI JSON/simple API (pip's index)         [leading dot = incl. subdomains]
#   .pythonhosted.org  — where PyPI serves the actual wheels/sdists (files.pythonhosted.org)
#   .npmjs.org         — npm registry + its CDN                     (registry.npmjs.org, *.npmjs.org)
#   registry.npmjs.org — explicit, in case a client pins the bare host
# Deliberately NOT included: github.com / git hosts (no push from the sandbox — by design), and
# alternate mirrors (npmmirror/taobao, the legacy pypi.python.org): our fixtures use the canonical
# registries above, and every extra domain widens the lockdown. If a future fixture needs a mirror,
# add it HERE explicitly (one line) rather than loosening to `allow all`.
acl allowed_dst dstdomain .pypi.org
acl allowed_dst dstdomain .pythonhosted.org
acl allowed_dst dstdomain .npmjs.org
acl allowed_dst dstdomain registry.npmjs.org

http_access allow allowed_dst
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports
http_access deny all

http_port 3128
